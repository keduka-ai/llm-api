networks:
  phi3m_network:
    name: phi3m_network


services:
  api:
    build:
      context: ./
      dockerfile: Dockerfile
    entrypoint: ["/app/entrypoint.sh"]
    expose:
      - 8000
    networks:
      - phi3m_network
    restart: unless-stopped
    environment:
      - MODEL1_NAME=instruct
      - MODEL1_URL=http://llama-instruct:8080
      - MODEL2_NAME=reasoning
      - MODEL2_URL=http://llama-reasoning:8080
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      llama-instruct:
        condition: service_healthy

  llama-instruct:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    expose:
      - 8080
    networks:
      - phi3m_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['all']
              capabilities: [gpu]
    command: >
      --host 0.0.0.0 --port 8080
      -m /models/Qwen3.5-4B-Q4_1.gguf
      --alias instruct
      -ngl 99
      -fa on
      -c 85000
      -ub 2048
      --cont-batching
      --parallel 2
      --no-context-shift
      --jinja
      --chat-template-kwargs '{"enable_thinking": true}'
      --reasoning-format deepseek
    shm_size: '16gb'
    volumes:
      - ./ai_api/models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 180s

  llama-reasoning:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    expose:
      - 8080
    networks:
      - phi3m_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['all']
              capabilities: [gpu]
    command: >
      --host 0.0.0.0 --port 8080
      -m /models/Phi-4-mini-reasoning-UD-Q8_K_XL.gguf
      --alias reasoning
      -ngl 99
      -fa on
      -c 10000
      -ub 1024
      --cont-batching
      --parallel 2
      --jinja
      --reasoning-format deepseek
    shm_size: '16gb'
    volumes:
      - ./ai_api/models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s

  nginx:
    build: ./nginx
    ports:
      - 8001:80
    restart: unless-stopped
    networks:
      - phi3m_network
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 3
