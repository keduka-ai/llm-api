networks:
  phi3m_network:
    name: phi3m_network


services:
  phi3m:
    build:
      context: ./
      dockerfile: Dockerfile-dev
    expose:
      - 8000
    networks:
      - phi3m_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/local/cuda/extras/CUPTI/lib64:$LD_LIBRARY_PATH
      - NVIDIA_VISIBLE_DEVICES=all  # Use all available GPUs
    runtime: nvidia  # Specify the NVIDIA runtime
    env_file:
      - .env
    volumes:
      - ./:/app  

  # phi3m1:
