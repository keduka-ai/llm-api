  #   runtime: nvidia  # Specify the NVIDIA runtime
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./:/app  

  sys_agent:
    build:
      context: /home/samusachi/WorkStation/ai-services/agents/sys-agent/src
      dockerfile: Dockerfile
    networks:
      - phi3m_network
    restart: unless-stopped
    depends_on:
      - phi3m
    volumes:
      - /home/samusachi/WorkStation/ai-services/agents/sys-agent/src/:/app
    ports:
      - 9001:8000

  py_agent:
    build:
      context: /home/samusachi/WorkStation/ai-services/agents/py-agent/src
      dockerfile: Dockerfile
    networks:
      - phi3m_network
    restart: unless-stopped
    depends_on:
      - phi3m
      # - sys_agent
    volumes:
      - /home/samusachi/WorkStation/ai-services/agents/py-agent/src/:/app
    ports:
      - 9002:8000

  nginx:
    build: ./nginx
    ports:
      - 8001:80
    restart: unless-stopped
    networks:
      - phi3m_network
    depends_on: 
      - phi3m
      # - phi3m1
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 3

