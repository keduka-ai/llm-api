upstream api_backend {
    server api:8000;
}

server {
    listen 80;
    server_name localhost;

    # Use Docker's embedded DNS for dynamic upstream resolution
    resolver 127.0.0.11 valid=5s;
    resolver_timeout 5s;

    # Increase the maximum allowed size of the client request body
    client_max_body_size 50m;

    # Increase the buffer size for reading the client request body
    client_body_buffer_size 100m;

    # (Optional) Increase the timeout for reading the client request body
    # client_body_timeout 60s;

    location / {
        # Resolve upstream dynamically on each request (needed for --scale)
        set $backend http://api:8000;
        proxy_pass $backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;

        # Increase proxy timeout settings
        proxy_connect_timeout 36000;
        proxy_send_timeout 36000;
        proxy_read_timeout 36000;
        send_timeout 36000;

        # Adjust buffer settings for handling larger responses
        proxy_buffer_size 5m;
        proxy_buffers 16 5m;  
        proxy_busy_buffers_size 10m;

        # Enable gzip compression to reduce the size of the response payload
        gzip on;
        gzip_buffers 16 8k;
        gzip_comp_level 5;
        gzip_types text/plain application/json;

        # Configure retry mechanism to handle failed upstream requests
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 1;

        # Optional: You can also limit the request body size to avoid overwhelming the server
        # client_max_body_size 50m;
    }
}
